name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build binary
        run: bun run build

      # scripts/smoke.sh is excluded on purpose — it drives a disposable local sshd +
      # Postgres Docker fixture, which this runner doesn't build. Unit tests (mocked
      # transport, see src/__tests__/) cover the same request-shaping logic without that
      # dependency; scripts/smoke.sh is a contributor-run regression check (see
      # CONTRIBUTING.md).
